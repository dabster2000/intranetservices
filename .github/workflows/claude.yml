name: Claude Code

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, ready_for_review]
  issues:
    types: [opened, assigned]

jobs:
  # ── Auto-review on every PR ──────────────────────────────
  auto-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a **Java 21 / Quarkus 3.30.x / Hibernate ORM with Panache** backend PR.
            The project follows DDD principles (rich domain model), uses Flyway for migrations,
            and serves a Next.js frontend via REST APIs.

            ## Review checklist

            ### DDD compliance
            - Business logic belongs in **entities**, not services
            - Services are **orchestration-only** (coordinate entities, handle transactions)
            - Cross-aggregate references use **UUID strings**, not `@ManyToOne`
            - Value objects are immutable where possible
            - No anemic domain model (entities with only getters/setters)

            ### REST conventions
            - Resource-oriented URLs (nouns, not RPC verbs)
            - Correct HTTP methods: GET (read), POST (create), PUT (full replace), PATCH (partial update), DELETE
            - Proper status codes: 200 (ok), 201 (created), 204 (no content), 400 (validation), 404 (not found), 409 (conflict)
            - `@RolesAllowed` annotation on **every** endpoint
            - Resources delegate to services — no business logic in resource classes

            ### DTO design
            - Java records for DTOs (not classes)
            - Separate DTOs: `Create*Request`, `Update*Request`, `*Response`
            - `@JsonProperty` annotations where frontend expects different casing
            - No entity classes exposed directly in API responses

            ### Validation
            - `@Valid @NotNull` on request body parameters
            - Bean Validation annotations on DTO fields (`@NotBlank`, `@Size`, `@Pattern`, etc.)
            - Consistent error response shape matching existing ExceptionMappers
            - Frontend and backend validation rules must agree

            ### Transaction management
            - `@Transactional` on **service methods**, not resource methods
            - Proper rollback behavior for business rule violations
            - No long-running transactions across HTTP calls

            ### Flyway migrations
            - Naming: `V{number}__{description}.sql` (double underscore)
            - Safe DDL: no `DROP TABLE` without migration safety plan
            - Stored procedures/views/triggers follow existing naming conventions
            - Indexes reviewed for query performance
            - Rollback/mitigation strategy documented

            ### Security
            - No SQL injection (use parameterized queries / Panache finders)
            - No hardcoded secrets, credentials, or API keys
            - Authorization checks beyond `@RolesAllowed` where data-level access control is needed
            - Input sanitization for user-supplied strings
            - No sensitive data in log statements

            ### Business rules
            - Financial year: **July 1 → June 30** (NOT calendar year)
            - Date handling via `DateUtils` utility
            - Number/currency formatting via `NumberUtils`
            - Proper timezone handling (UTC storage, local display)

            ### Panache queries
            - Correct finder method usage
            - Parameter binding order matches query placeholders
            - No accidental EAGER fetching pulling unexpected data
            - Named queries preferred for complex operations

            ### Error handling
            - ExceptionMappers produce consistent error shapes
            - Error model matches what the Next.js frontend expects
            - No swallowed exceptions (`catch` blocks that silently ignore errors)
            - Proper logging with context (entity ID, operation, user)

            ## Output format
            Use `mcp__github_inline_comment__create_inline_comment` for specific code issues.
            Post a single summary comment using `gh pr comment` with:
            - **Verdict**: APPROVE / REQUEST_CHANGES / COMMENT
            - **Quality score**: A (excellent) / B (good, minor issues) / C (needs work) / D (significant issues) / F (blocking problems)
            - **Critical issues**: count and one-line descriptions
            - **Suggestions**: non-blocking improvements
          claude_args: |
            --max-turns 10
            --model claude-sonnet-4-6
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"

  # ── Interactive @claude ──────────────────────────────────
  interactive:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: claude-interactive-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 25
            --model claude-sonnet-4-6
