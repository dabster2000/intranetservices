name: Deploy Quarkus to Production ECS Express

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'

# Serialize ECS deploys: if a deploy is already running when a new push
# arrives, queue the new one until the in-flight deploy finishes. Prevents
# ECS "ServiceUpdateInProgress" failures when rapid pushes stack up.
# cancel-in-progress: false — let the in-flight deploy finish, then run the
# next one with the latest commit.
concurrency:
  group: production-quarkus-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests -B -T 1C

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: |
            ${{ vars.ECR_REPO }}:${{ github.sha }}
            ${{ vars.ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to ECS Express
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: tw-quarkus-production
          image: ${{ vars.ECR_REPO }}:${{ github.sha }}
          execution-role-arn: ${{ vars.ECS_EXECUTION_ROLE_ARN }}
          infrastructure-role-arn: ${{ vars.ECS_INFRA_ROLE_ARN }}
          task-role-arn: ${{ vars.ECS_TASK_ROLE_QUARKUS_ARN }}
          cluster: ${{ vars.ECS_CLUSTER }}
          container-port: 9093
          subnets: ${{ vars.PUBLIC_SUBNET_A }},${{ vars.PUBLIC_SUBNET_B }}
          security-groups: ${{ vars.ECS_TASK_SG }}
          cpu: '2048'
          memory: '4096'
          # Liveness-only ALB health check. /health (SmallRye root) also runs
          # @Readiness checks — including OpexDistributionFreshnessCheck, which
          # reports DOWN on stale finance data. Readiness DOWN on the ALB path
          # deprovisions every task (all tasks share one DB, so it sheds no
          # load) and triggers a cold-start CPU storm. /health/live is the
          # liveness group (CustomHealthCheck, always UP while the JVM runs).
          health-check-path: /health/live
          min-task-count: 1
          max-task-count: 5
          environment-variables: |
            [
              {"name":"LOGLEVEL_Q","value":"INFO"},
              {"name":"APPLICATION_BASE_URL","value":"https://intra.trustworks.dk"},
              {"name":"SMTPSERVER","value":"mail.smtp2go.com"},
              {"name":"MAILUSERNAME","value":"trustworks.dk"},
              {"name":"JOURNALNUMBER","value":"7"},
              {"name":"EXPENSEJOURNALNUMBER","value":"16"},
              {"name":"EXPENSE_ECONOMICS_UPLOAD_ENABLED","value":"true"},
              {"name":"INVOICE_ECONOMICS_UPLOAD_ENABLED","value":"true"},
              {"name":"EXPENSE_ECONOMICS_SYNC_ENABLED","value":"true"},
              {"name":"INVOICE_ECONOMICS_SYNC_ENABLED","value":"true"},
              {"name":"FINANCE_ECONOMICS_LOAD_ENABLED","value":"true"},
              {"name":"ENVIRONMENT_ID","value":"production"},
              {"name":"PERF_LOG_GROUP","value":"/aws/ecs/default/tw-quarkus-production-4cbe"},
              {"name":"PERF_DIGEST_ENABLED","value":"true"},
              {"name":"INVOICE_S3","value":"invoicefiles-new"},
              {"name":"OTEL_EXPORTER_OTLP_TRACES_ENDPOINT","value":"http://localhost:4317"},
              {"name":"OTEL_EXPORTER_OTLP_TRACES_ENABLED","value":"false"},
              {"name":"CLOUDWATCH_LOG_GROUP_BACKEND","value":"/ecs/tw-quarkus-production"},
              {"name":"CLOUDWATCH_LOG_GROUP_FRONTEND","value":"/ecs/tw-nextjs-production"},
              {"name":"INDIVIDUAL_BONUS_MONTHLY_AUTHORING_ENABLED","value":"true"},
              {"name":"INDIVIDUAL_BONUS_MONTHLY_MATERIALIZATION_ENABLED","value":"true"},
              {"name":"INDIVIDUAL_BONUS_MONTHLY_RECONCILIATION_ENABLED","value":"true"},
              {"name":"DK_TRUSTWORKS_RECRUITMENT_GRAPH_CALENDAR_ENABLED","value":"true"}
            ]
          secrets: |
            [
              {"name":"URL","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:URL::"},
              {"name":"USERNAME","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:USERNAME::"},
              {"name":"PASSWORD","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:PASSWORD::"},
              {"name":"MOTHERSLACKBOTTOKEN","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:MOTHERSLACKBOTTOKEN::"},
              {"name":"ADMINSLACKBOTTOKEN","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:ADMINSLACKBOTTOKEN::"},
              {"name":"MAILPASSWORD","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:MAILPASSWORD::"},
              {"name":"XAPPSERCREETTOKEN","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:XAPPSERCREETTOKEN::"},
              {"name":"XAGREEMENTGRANTTOKEN","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:XAGREEMENTGRANTTOKEN::"},
              {"name":"API_KEY","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:API_KEY::"},
              {"name":"INV_GENERATOR","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:INV_GENERATOR::"},
              {"name":"EDENAI_APIKEY","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:EDENAI_APIKEY::"},
              {"name":"OPENAI_APIKEY","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:OPENAI_APIKEY::"},
              {"name":"AZURE_CLIENT_ID","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:AZURE_CLIENT_ID::"},
              {"name":"AZURE_CLIENT_SECRET","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:AZURE_CLIENT_SECRET::"},
              {"name":"AZURE_TENANT_ID","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:AZURE_TENANT_ID::"},
              {"name":"CVTOOL_USERNAME","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:CVTOOL_USERNAME::"},
              {"name":"CVTOOL_PASSWORD","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:CVTOOL_PASSWORD::"},
              {"name":"GH_TOKEN","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:GH_TOKEN::"},
              {"name":"VIRKDATA_API_KEY","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:VIRKDATA_API_KEY::"}
            ]

      # Gate: the ECS Express deploy action reports success even when the canary
      # fails to start and ECS silently rolls back to the previous task definition
      # (e.g. a Hibernate SessionFactory build failure crashes the container at
      # boot — which `mvn package` cannot catch). Assert the PRIMARY task is
      # actually running the image we just pushed; otherwise fail the workflow.
      - name: Verify deployment landed (no silent rollback)
        run: |
          set -euo pipefail
          CLUSTER="${{ vars.ECS_CLUSTER }}"
          SERVICE="tw-quarkus-production"
          EXPECTED_TAG="${{ github.sha }}"
          echo "Expecting PRIMARY task to run image tag: $EXPECTED_TAG"
          for i in $(seq 1 24); do
            PRIMARY_TD=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --region "$AWS_REGION" \
              --query 'services[0].deployments[?status==`PRIMARY`]|[0].taskDefinition' --output text)
            ROLLOUT=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --region "$AWS_REGION" \
              --query 'services[0].deployments[?status==`PRIMARY`]|[0].rolloutState' --output text)
            IMAGE=$(aws ecs describe-task-definition --task-definition "$PRIMARY_TD" --region "$AWS_REGION" \
              --query 'taskDefinition.containerDefinitions[0].image' --output text)
            echo "attempt $i: rolloutState=$ROLLOUT image=$IMAGE"
            if [ "$ROLLOUT" = "COMPLETED" ]; then
              case "$IMAGE" in
                *":$EXPECTED_TAG")
                  echo "✅ Deployment verified: PRIMARY task is running $EXPECTED_TAG"
                  exit 0 ;;
                *)
                  echo "::error::Deploy rolled back — PRIMARY image is '$IMAGE', expected tag '$EXPECTED_TAG'. The new container failed to start (check CloudWatch /aws/ecs/default/tw-quarkus-production-* for the boot error)."
                  exit 1 ;;
              esac
            fi
            if [ "$ROLLOUT" = "FAILED" ]; then
              echo "::error::ECS rollout FAILED for tag '$EXPECTED_TAG' — task failed to start. Check CloudWatch logs for the boot error."
              exit 1
            fi
            sleep 15
          done
          echo "::error::Timed out after ~6m waiting for the PRIMARY deployment to settle."
          exit 1
