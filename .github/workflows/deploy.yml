name: Deploy Quarkus to Staging ECS Express

on:
  push:
    branches: [staging]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'

# Serialize ECS deploys: if a deploy is already running when a new push
# arrives, queue the new one until the in-flight deploy finishes. Prevents
# ECS "ServiceUpdateInProgress" failures when rapid pushes stack up.
# cancel-in-progress: false — let the in-flight deploy finish, then run the
# next one with the latest commit.
concurrency:
  group: staging-quarkus-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests -B -T 1C

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: |
            ${{ vars.ECR_REPO }}:${{ github.sha }}
            ${{ vars.ECR_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to ECS Express
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: tw-quarkus-staging
          image: ${{ vars.ECR_REPO }}:${{ github.sha }}
          execution-role-arn: ${{ vars.ECS_EXECUTION_ROLE_ARN }}
          infrastructure-role-arn: ${{ vars.ECS_INFRA_ROLE_ARN }}
          task-role-arn: ${{ vars.ECS_TASK_ROLE_QUARKUS_ARN }}
          cluster: ${{ vars.ECS_CLUSTER }}
          container-port: 9093
          subnets: ${{ vars.PUBLIC_SUBNET_A }},${{ vars.PUBLIC_SUBNET_B }}
          security-groups: ${{ vars.ECS_TASK_SG }}
          cpu: '1024'
          memory: '4096'
          health-check-path: /health
          min-task-count: 1
          max-task-count: 3
          environment-variables: |
            [
              {"name":"LOGLEVEL_Q","value":"INFO"},
              {"name":"APPLICATION_BASE_URL","value":"https://intra.trustworks.dk"},
              {"name":"SMTPSERVER","value":"mail.smtp2go.com"},
              {"name":"MAILUSERNAME","value":"trustworks.dk"},
              {"name":"JOURNALNUMBER","value":"7"},
              {"name":"EXPENSEJOURNALNUMBER","value":"16"},
              {"name":"INVOICE_S3","value":"invoicefiles-test"},
              {"name":"OTEL_EXPORTER_OTLP_TRACES_ENDPOINT","value":"http://localhost:4317"},
              {"name":"OTEL_EXPORTER_OTLP_TRACES_ENABLED","value":"false"},
              {"name":"CLOUDWATCH_LOG_GROUP_BACKEND","value":"/ecs/tw-quarkus-staging"},
              {"name":"CLOUDWATCH_LOG_GROUP_FRONTEND","value":"/ecs/tw-nextjs-staging"}
            ]
          secrets: |
            [
              {"name":"URL","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:URL::"},
              {"name":"USERNAME","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:USERNAME::"},
              {"name":"PASSWORD","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:PASSWORD::"},
              {"name":"MOTHERSLACKBOTTOKEN","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:MOTHERSLACKBOTTOKEN::"},
              {"name":"ADMINSLACKBOTTOKEN","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:ADMINSLACKBOTTOKEN::"},
              {"name":"MAILPASSWORD","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:MAILPASSWORD::"},
              {"name":"XAPPSERCREETTOKEN","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:XAPPSERCREETTOKEN::"},
              {"name":"XAGREEMENTGRANTTOKEN","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:XAGREEMENTGRANTTOKEN::"},
              {"name":"API_KEY","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:API_KEY::"},
              {"name":"INV_GENERATOR","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:INV_GENERATOR::"},
              {"name":"EDENAI_APIKEY","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:EDENAI_APIKEY::"},
              {"name":"OPENAI_APIKEY","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:OPENAI_APIKEY::"},
              {"name":"AZURE_CLIENT_ID","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:AZURE_CLIENT_ID::"},
              {"name":"AZURE_CLIENT_SECRET","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:AZURE_CLIENT_SECRET::"},
              {"name":"AZURE_TENANT_ID","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:AZURE_TENANT_ID::"},
              {"name":"CVTOOL_USERNAME","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:CVTOOL_USERNAME::"},
              {"name":"CVTOOL_PASSWORD","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:CVTOOL_PASSWORD::"},
              {"name":"GH_TOKEN","valueFrom":"${{ vars.QUARKUS_SECRETS_ARN }}:GH_TOKEN::"}
            ]
