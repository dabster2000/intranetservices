    sales-threshold-per-partner: 4000000.0
    base-share-value: 0.035
    calibration-value: 30.0
    production-annual-threshold: 1500000.0
    production-commission-rate: 0.20

bug-report:
  ai:
    model: ${BUGREPORT_AI_MODEL:gpt-5}
    vector-store-id: ${BUGREPORT_VECTOR_STORE_ID:vs_69b732518c0081918dcd98133a178742}
  cloudwatch:
    log-group-backend: ${CLOUDWATCH_LOG_GROUP_BACKEND:/aws/apprunner/tw-quarkus-staging}
    log-group-frontend: ${CLOUDWATCH_LOG_GROUP_FRONTEND:/aws/apprunner/tw-nextjs-staging}

sharepoint:
  hostname: tenant.sharepoint.com

virkdata:
  # API key for virkdata.dk CVR registry. Sourced from the Secrets Manager entry
