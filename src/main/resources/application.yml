quarkus:
  application:
    name: trustworks-intranet
    base-url: ${APPLICATION_BASE_URL:http://127.0.0.1:8080}
  datasource:
    db-kind: mariadb
    metrics:
      enabled: true
    jdbc:
      url: ${URL:jdbc:mariadb://127.0.0.1:3306/twservices?collation=utf8mb4_general_ci}
      driver: org.mariadb.jdbc.Driver
      # Pool sizing — RDS parameter group mariadb10 allows max_connections=200.
      # Peak observed RDS connections to date is ~41, so 64 leaves headroom without
      # crowding other consumers (staging, Lambda, batch jobs).
      min-size: 5
      max-size: 64
      # Wait up to 30s for a connection before failing. The default of 5s combined
      # with PT1M idle-removal caused cold-start bursts to throw
      # "Sorry, acquisition timeout!" en masse (1,800+ events in 48h, see
      # docs/incidents/2026-05-21-kenn-milo-recovery.sql). 30s is safe because we
      # already extended Narayana's default-transaction-timeout to 600s below.
      acquisition-timeout: PT30S
      # Stop aggressively shrinking the pool to min-size every minute. The 1-minute
      # value caused repeated cold-start storms when traffic spikes arrived right
      # after a shrink.
      idle-removal-interval: PT5M
      background-validation-interval: PT2M
      # Surface long-held connections (likely @Transactional methods holding pool
      # connections under load) within 1 minute. The previous PT2M was tightened
      # to PT1M during Wave 1A pool-starvation remediation (2026-05-27) to give
      # faster forensic signal under pool pressure.
      leak-detection-interval: PT1M
      # Emit per-pool Agroal metrics (active count, awaiting count, blocking time,
      # acquisition time, etc.) into the Micrometer registry so that once the
      # CloudWatch registry is wired (W1A.8 / future), agroal_awaiting_count > 0
      # can be alarmed before the pool actually starves. Wave 1A observability
      # addition; today Prometheus is the only configured registry.
      enable-metrics: true
    username: ${USERNAME:root}
    password: ${PASSWORD:1606}
    # Dedicated readiness-probe pool. Reuses the same RDS credentials/URL but lives
    # in its own tiny isolated pool so that when the default pool starves under
    # load, /health/ready still returns 200 — preventing the ALB from killing
    # the task and triggering a kill-restart cascade. Wave 1A addition (2026-05-27).
    # max-size=4: ALB readiness probes can stack (cold-start probe storms, dual-listener
    # configs can put 2-4 in flight). At acquisition-timeout=PT2S, max=2 would fail-fast
    # a 3rd concurrent probe — exactly the scenario this pool exists to prevent.
    '"health"':
      db-kind: mariadb
      jdbc:
        url: ${URL:jdbc:mariadb://127.0.0.1:3306/twservices?collation=utf8mb4_general_ci}
        driver: org.mariadb.jdbc.Driver
        min-size: 1
        max-size: 4
        acquisition-timeout: PT2S
        background-validation-interval: PT1M
      username: ${USERNAME:root}
      password: ${PASSWORD:1606}
  transaction-manager:
    # OpexDistributionRefreshService.refresh() loads ~165k rows from finance_details +
    # fact_user_day and inserts 321 rows in one prepared statement — real duration is
    # 56-60s. The Narayana default of 60s is too tight; staging (1 vCPU) blows past it
    # while production (2 vCPU) succeeds by ~4s. 600s gives generous headroom without
    # masking pathological regressions.
    default-transaction-timeout: 600s
  hibernate-orm:
    jdbc:
      statement-batch-size: 32
    second-level-caching-enabled: true
    statistics: true
    log:
      queries-slower-than-ms: ${PERF_SLOW_QUERY_MS:500}
    unsupported-properties:
      "hibernate.order_inserts": "true"
      "hibernate.order_updates": "true"
  flyway:
    migrate-at-start: true
    repair-at-start: true
    baseline-on-migrate: true
    baseline-version: 1.0
    baseline-description: initial baseline
    out-of-order: true
  swagger-ui:
    always-include: true
  smallrye-openapi:
    filter: dk.trustworks.intranet.security.PublicOnlyOASFilter
  keycloak:
    devservices:
      enabled: false
  oidc-client:
    graph:
      auth-server-url: https://login.microsoftonline.com/${AZURE_TENANT_ID:xx}/v2.0
      client-id: ${AZURE_CLIENT_ID:xx}
      credentials:
        client-secret:
          value: ${AZURE_CLIENT_SECRET:xx}
          method: post
      grant:
        type: client
      scopes: https://graph.microsoft.com/.default
  mailer:
    auth-methods: LOGIN
    from: no-reply@trustworks.dk
    host: ${SMTPSERVER:email-smtp.eu-west-1.amazonaws.com}
    port: 587
    start-tls: REQUIRED
    username: ${MAILUSERNAME:xx}
    password: ${MAILPASSWORD:xx}
    mock: false
  http:
    limits:
      max-body-size: 40M
      max-form-attribute-size: 40M
    access-log:
      enabled: true
      pattern: common #"...traceId=%{X,traceId} spanId=%{X,spanId}" #common
    port: 9093 #registry.hub.docker.com/
  smallrye-health:
    root-path: /health
  otel:
    enabled: true
    traces:
      exporter: ${OTEL_TRACES_EXPORTER:none}
    exporter:
      otlp:
        traces:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4317}
          enabled: ${OTEL_EXPORTER_OTLP_TRACES_ENABLED:false}
  rest-client:
    graph-api:
      url: https://graph.microsoft.com
      scope: jakarta.inject.Singleton
      connect-timeout: 10000
      read-timeout: 60000
    openai-api:
      url: https://api.openai.com
      scope: jakarta.inject.Singleton
      read-timeout: 110000      # 110 seconds — must complete before BFF timeout (118s)
      connect-timeout: 10000    # 10 seconds for connection establishment
    economics-journals-api:
      url: https://apis.e-conomic.com/journalsapi/v13.0.1
      scope: jakarta.inject.Singleton
      connect-timeout: 10000
      read-timeout: 30000
    economics-customers-api:
      url: https://apis.e-conomic.com/customersapi/v3.1.0
      scope: jakarta.inject.Singleton
      connect-timeout: 10000
      read-timeout: 30000
    economics-q2c-api:
      url: https://apis.e-conomic.com/q2capi/v5.1.0
      scope: jakarta.inject.Singleton
      connect-timeout: 10000
      read-timeout: 30000
    economics-legacy-rest:
      url: https://restapi.e-conomic.com
      scope: jakarta.inject.Singleton
      connect-timeout: 10000
      read-timeout: 30000
    cvtool:
      url: https://tw-cvtool-backend.azurewebsites.net
      scope: jakarta.inject.Singleton
      connect-timeout: 10000
      read-timeout: 30000
    nextsign:
      url: https://www.nextsign.dk
      scope: jakarta.inject.Singleton
      connect-timeout: 10000
      read-timeout: 30000
    nextsign-document:
      url: https://api.nextsign.dk
      scope: jakarta.inject.Singleton
      connect-timeout: 10000
      read-timeout: 30000
    nextsign-convert:
      url: https://www.nextsign.dk
      scope: jakarta.inject.Singleton
      connect-timeout: 5000       # 5 seconds for connection
      read-timeout: 90000         # 90 seconds for PDF conversion
    virkdata:
      url: https://virkdata.dk
      scope: jakarta.inject.Singleton
      connect-timeout: 5000       # 5 seconds for connection
      read-timeout: 10000         # 10 seconds for CVR API response
    core-threads: 10
    max-threads: 30
  log:
    level: INFO
    handler:
      console:
        "perf":
          enable: true
          format: "%m%n"
    category:
      "dk.trustworks":
        level: INFO
      "dk.trustworks.perf":
        level: INFO
        handlers:
          - perf
        use-parent-handlers: false
      "io.quarkus.http":
        level: INFO
      "org.jboss.resteasy.resteasy_client":
        level: INFO
      "io.quarkus.smallrye.health":
        level: WARN  # This will stop logging health check INFO level messages
      #"io.opentelemetry":
      #  level: DEBUG
    console:
      enable: true
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%t] [%X{userUuid}] traceId=%X{traceId} %c{1.} - %m%n"
      #format: "%d{HH:mm:ss} %-5p traceId=%X{traceId}, parentId=%X{parentId}, spanId=%X{spanId}, sampled=%X{sampled} [%c{2.}] (%t) %s%e%n"
      level: DEBUG
      #providers: com. #com.fasterxml.jackson.jaxrs.json.JacksonJsonProvider
  #otel:
  #  exporter:
  #    otlp:
  #      endpoint: http://jaeger:4317 #4317
  cache:
    caffeine:
      "employee-data-per-month-cache":
        expire-after-write: 3H
      employee-budgets:
        expire-after-write: 30M  # Expire after 30 minutes
      employee-availability:
        expire-after-write: 30M  # Expire after 30 minutes
      employee-revenue:
        expire-after-write: 30M
      work-cache:
        expire-after-write: 15M  # Expire after 15 minutes for work data
        maximum-size: 10000  # Maximum number of cached entries
      contract-effective-rules:
        expire-after-write: ${feature.contract.overrides.cache.ttl-seconds:3600}s  # Contract rule override cache
        maximum-size: ${feature.contract.overrides.cache.max-size:1000}  # Maximum cached rule sets
      client-health:
        expire-after-write: 1H  # Client health cache (1 hour TTL)
        maximum-size: 1000  # Maximum number of client health entries
      consultant-allocation:
        expire-after-write: 1H  # Consultant allocation cache (1 hour TTL)
        maximum-size: 1000  # Maximum number of allocation entries
      page-registry:
        expire-after-write: 5M  # Page registry cache (5 min TTL for quick updates)
        maximum-size: 100  # Small table - only ~20-50 pages expected
      cvr-lookup:
        expire-after-write: 24H  # CVR data rarely changes; cache for 24h to conserve 50/day quota
        maximum-size: 500  # Max cached CVR lookups
  s3:
    sync-client:
      type: APACHE
    aws:
      region: eu-west-1
      credentials:
        # DEFAULT uses the AWS SDK DefaultCredentialsProvider chain.
        # On App Runner this resolves task-role creds from the container
        # metadata endpoint; on ECS the same chain reads from
        # $AWS_CONTAINER_CREDENTIALS_RELATIVE_URI. No static keys.
        type: DEFAULT
  native:
    additional-build-args:
      - -H:IncludeResources=.*\\.pem
      - -H:IncludeResources=META-INF/resources/.*
      - --initialize-at-run-time=org.apache.commons.logging.impl.Log4JLogger
      - --initialize-at-run-time=io.netty.util.internal.logging.Log4JLogger


mp:
  jwt:
    verify:
      issuer: https://trustworks.dk
      publickey:
        location: META-INF/resources/publicKey.pem
feature:
  # Attribution-driven internal invoice line generation (spec 2026-04-21).
  # When true, internal-invoice creation and cascade regeneration derive lines
  # from invoice_item_attributions × source items. Defaults on in every env;
  # flip to false only as an emergency rollback.
  invoicing:
    internal:
      # Override via env var FEATURE_INVOICING_INTERNAL_ATTRIBUTION_DRIVEN or
      # the Quarkus config key `feature.invoicing.internal.attribution-driven`.
      attribution-driven: true
  # Contract Rule Override System feature flags
  contract:
    overrides:
      # Master switch - controls all override functionality
      enabled: true  # Set to true to enable override system

      # Sub-feature flags
      api:
        # Control REST API endpoints availability
        enabled: true  # Set to true to expose override APIs
        read-only: false  # Set to true for read-only mode (no creates/updates/deletes)

      ui:
        # Control UI component visibility (used by frontend)
        enabled: true  # Frontend reads this for menu items, buttons

      # Rollout control
      rollout:
        percentage: 100  # Percentage-based rollout (0-100)
        whitelist: ['50b1c03c-3429-4b3b-b0ed-ab5a59f7dc6f', 'bc5e2eab-1119-4d73-aeb9-e8aba4591cfa', 'd27a7fae-9b40-4a4c-9020-e7eb28fa1a75']  # List of contract UUIDs to enable (for pilot testing)

      # Performance tuning
      cache:
        ttl-seconds: 3600  # 1 hour cache (matching spec)
        max-size: 10000    # Max cached rule sets
invoicing:
  internal:
    # Contact-person name stamped on generated internal invoices. Externalized so
    # no individual's name is embedded in source code. Default is a generic label;
    # override per-environment if a specific contact is desired.
    default-contact-name: ${INVOICING_INTERNAL_DEFAULT_CONTACT_NAME:Trustworks Finance}
slack:
  slackApi: https://slack.com/api
  motherSlackBotToken: ${MOTHERSLACKBOTTOKEN:xx}
  adminSlackBotToken: ${ADMINSLACKBOTTOKEN:xx}
  # Operations alert channel (#ops-alert) — destination for pipeline-health
  # alerts emitted by FactChangeLogBacklogAlertBatchlet. Override per
  # environment if a separate test channel is desired.
  opsAlertChannel: ${SLACK_OPS_ALERT_CHANNEL:C0B2VQ2CFU1}
conference:
  slack:
    per-subject-max: ${CONFERENCE_SLACK_PER_SUBJECT_MAX:10}
    per-subject-delay-ms: ${CONFERENCE_SLACK_PER_SUBJECT_DELAY_MS:1100}
factChangeLog:
  # Daily retention window (in days) for processed change-log rows. Used by
  # ChangeLogRetentionBatchlet — rows whose processed_at is older than this
  # cutoff are deleted in chunks at 02:15 UTC each day.
  retention:
    days: ${FACT_CHANGE_LOG_RETENTION_DAYS:30}
  # Backlog-alert thresholds for FactChangeLogBacklogAlertBatchlet (every 5
  # minutes). Either threshold being breached triggers a Slack message to
  # slack.opsAlertChannel.
  backlogAlert:
    maxPending: ${FACT_CHANGE_LOG_BACKLOG_MAX_PENDING:500}
    maxOldestPendingMinutes: ${FACT_CHANGE_LOG_BACKLOG_MAX_OLDEST_MINUTES:30}
e-conomics:
  xAppSecretToken: ${XAPPSERCREETTOKEN:none}
  xAgreementGrantToken: ${XAGREEMENTGRANTTOKEN:none}
  journal-number: ${JOURNALNUMBER:15}
  expense-journal-number: ${EXPENSEJOURNALNUMBER:15}

# E-conomic revenue auto-import (PR 2 of external-invoice-import).
# When true (default for PR 2), the import service computes a DryRunOutcome
# and emits structured logs WITHOUT inserting any rows. PR 3 flips this off
# co-deployed with V341 for the production cutover.
economics:
  import:
    dry-run: ${ECONOMICS_IMPORT_DRY_RUN:false}
currencyapi:
  key: ${API_KEY:xx}
bucket:
  expenses: expensefiles
  files: trustworksfiles
  invoices: ${INVOICE_S3:invoicefiles-test}
edenai:
  api:
    key: ${EDENAI_APIKEY:xx}
openai:
  api:
    key: ${OPENAI_APIKEY:xx}
  model: gpt-5-nano #gpt-4o-mini
  # Model for invoice-attribution AI (InvoiceAttributionAIService). Kept separate from openai.model
  # because attribution sets a low temperature, which the gpt-5 family rejects with HTTP 400 — so
  # this defaults to a gpt-4o-family model the project can access. Override per env with
  # OPENAI_ATTRIBUTION_MODEL.
  attribution-model: ${OPENAI_ATTRIBUTION_MODEL:gpt-4o}
  # Vision-strong model used only by vision + strict-schema calls (e.g. receipt OCR
  # in ExpenseClassificationService). Reasoning-class models like gpt-5-nano burn
  # their output budget on thinking and frequently emit empty structured output for
  # image+schema requests, so vision is routed through a proven vision model.
  vision-model: ${OPENAI_VISION_MODEL:gpt-4o-mini}
# Staging must set EXPENSE_ECONOMICS_UPLOAD_ENABLED=false, INVOICE_ECONOMICS_UPLOAD_ENABLED=false and ENVIRONMENT_ID=staging
# so a staging-sync-polluted DB cannot POST vouchers to e-conomics and, if it ever
# does, cannot reuse production's idempotency keys.
# IMPORTANT: keep this single `dk:` block — SnakeYAML silently lets a later
# duplicate top-level `dk:` mapping override earlier ones, which would drop
# the kill-switch and environment-id properties at parse time.
# (Regression test: ApplicationYamlNoDuplicateKeysTest.)
dk:
  trustworks:
    expense:
      economics-upload:
        enabled: ${EXPENSE_ECONOMICS_UPLOAD_ENABLED:true}
      # Read-side e-conomic sync (expense-sync + expense-orphan-detection).
      # Staging sets EXPENSE_ECONOMICS_SYNC_ENABLED=false so a prod-cloned staging
      # DB never re-syncs against the shared real e-conomic tenant (429-storm fix).
      economics-sync:
        enabled: ${EXPENSE_ECONOMICS_SYNC_ENABLED:true}
        # Re-sync VERIFIED_UNBOOKED plus any row modified within this many days;
        # drops the stable booked/deleted tail from the nightly scan.
        recency-days: ${EXPENSE_ECONOMICS_SYNC_RECENCY_DAYS:30}
        # Per-item 429 retries before counting the item as throttled.
        max-retries: ${EXPENSE_ECONOMICS_SYNC_MAX_RETRIES:3}
        # Consecutive throttled items that trip the circuit breaker (abort run).
        abort-threshold: ${EXPENSE_ECONOMICS_SYNC_ABORT_THRESHOLD:15}
        # Optional inter-item sleep in ms (0 = off).
        pacing-ms: ${EXPENSE_ECONOMICS_SYNC_PACING_MS:0}
    invoice:
      economics-upload:
        enabled: ${INVOICE_ECONOMICS_UPLOAD_ENABLED:true}
      # Read-side e-conomic sync (economics-invoice-status-sync). Staging false.
      economics-sync:
        enabled: ${INVOICE_ECONOMICS_SYNC_ENABLED:true}
        # Only poll BOOKED invoices issued within this many days for BOOKED->PAID;
        # bounds an otherwise unbounded daily scan. Generous default: real payments
        # land well inside a year. Widen if the "older than cutoff not polled" log grows.
        recency-days: ${INVOICE_ECONOMICS_SYNC_RECENCY_DAYS:365}
    finance:
      # Read-side e-conomic load (finance-load-economics). Staging false.
      economics-load:
        enabled: ${FINANCE_ECONOMICS_LOAD_ENABLED:true}
    environment:
      id: ${ENVIRONMENT_ID:production}
    intranet:
      expenseservice:
        remote:
          EconomicsAPI/mp-rest/url: https://restapi.e-conomic.com
          EconomicsAPIFile/mp-rest/url: https://restapi.e-conomic.com
          EconomicsAPIAccount/mp-rest/url: https://restapi.e-conomic.com
      aggregates:
        accounting:
          salary-buffer-multiplier: 1.02  # 2% buffer for salary calculations
        invoice:
          network:
            CurrencyAPI/mp-rest/url: https://api.freecurrencyapi.com
      opex-distribution:
        refresh-window-fy-back: 1
        max-staleness-hours: 30
      # E-conomic revenue auto-import (PR 2 of external-invoice-import).
      # Freshness threshold for EconomicRevenueImportFreshnessCheck. Stays
      # close to the 24h cron cadence; +1h grace covers clock skew + retry.
      economic-revenue-import:
        max-staleness-hours: 25
    perf:
      metrics:
        enabled: ${PERF_METRICS_ENABLED:true}
      env: ${PERF_ENV:production}
      digest:
        enabled: ${PERF_DIGEST_ENABLED:false}   # nightly analyzer off by default; enable per-env
      log-group: ${PERF_LOG_GROUP:${CLOUDWATCH_LOG_GROUP_BACKEND:/ecs/tw-quarkus-unknown}}
pricingEngine:
  enabled: true
cvtool:
  username: ${CVTOOL_USERNAME:}
  password: ${CVTOOL_PASSWORD:}

nextsign:
  company: ${NEXTSIGN_COMPANY:69313a4a3abed8e75359da3f}
  bearer-token: ${NEXTSIGN_BEARER_TOKEN:key_z5TGFFHtbIzmHgZfChogJkibyuTOsEJC0PM6kAHP36TFcbrckrAnrLbQewBLZu7D}

# Word-to-PDF Converter Configuration
# Uses poi-tl for placeholder replacement + LibreOffice for PDF conversion
word-converter:
  backend: ${WORD_CONVERTER_BACKEND:local}
  libreoffice:
    path: ${LIBREOFFICE_PATH:/usr/bin/libreoffice}
    timeout-seconds: ${LIBREOFFICE_TIMEOUT:60}
  temp-dir: ${WORD_CONVERTER_TEMP_DIR:/tmp/word-converter}
  fallback-enabled: ${WORD_CONVERTER_FALLBACK:true}
  max-concurrent: ${WORD_CONVERTER_MAX_CONCURRENT:3}

bonus:
