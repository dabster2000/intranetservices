# Disable S3/LocalStack dev services during tests — Docker is not required
# The quarkus.s3.devservices.enabled key must be set at build time;
# the test profile in the test class also disables it at runtime.
quarkus.s3.devservices.enabled=false

# Pin the attribution-driven internal-invoice flag OFF for the default test
# profile so legacy test fixtures (which predate the attribution bridge table)
# stay green. Tests that exercise the new flow opt in via @TestProfile.
feature.invoicing.internal.attribution-driven=false
