# Disable S3/LocalStack dev services during tests — Docker is not required
# The quarkus.s3.devservices.enabled key must be set at build time;
# the test profile in the test class also disables it at runtime.
quarkus.s3.devservices.enabled=false

# Pin the attribution-driven internal-invoice flag OFF for the default test
# profile so legacy test fixtures (which predate the attribution bridge table)
# stay green. Tests that exercise the new flow opt in via @TestProfile.
feature.invoicing.internal.attribution-driven=false

# CVTool credentials are not used by the Phase 3 People/Executive tests but
# are wired as required @ConfigProperty values elsewhere in the app, so we
# provide harmless defaults for the default test profile. Tests that need
# real credentials override these via @TestProfile.
cvtool.username=test
cvtool.password=test

# Recruitment event backbone (ATS P1): keep the scheduled catch-up job off
# during tests — reactor tests drive catchUp() deterministically themselves,
# and a mid-suite background sweep would race their failure-injection
# fixtures. The job itself is exercised by RecruitmentEventCatchupJobTest
# via JobOperator.
dk.trustworks.recruitment.catchup.enabled=false
# No grace horizon in tests: sweeps must see events the test just committed.
# (In production the horizon keeps the watermark from skipping seq gaps of
# still-uncommitted transactions; default 300s.)
dk.trustworks.recruitment.catchup.grace-seconds=0

# HR completion-notification recipient for the signature-completion listener
# email test (RecruitmentSignatureCompletionListenerEventTest). Keyed by the
# fixed target_company_uuid its email-path fixture assigns to the candidate so
# the recipient resolution actually yields an address (other companies stay
# unconfigured and silently skip). Value is a throwaway example address.
recruitment.completion-notification.11111111-1111-1111-1111-111111111111=hr-fixture@example.com
